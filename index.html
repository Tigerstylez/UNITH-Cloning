<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNITH - Head Video Upload Dashboard</title>

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="16x16" href="Favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="Favicon.png">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at center, #0033cc 0%, #000814 100%);
      color: white;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .card-dark {
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
    }
    h1, h2, h3 { letter-spacing: 0.05em; }
    .upload-area {
      border: 2px dashed rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }
    .upload-area:hover {
      border-color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.05);
    }
    .upload-area.dragover {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
    }
  </style>

</head>

<body class="min-h-screen text-white">

  <!-- Top Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-black/20 backdrop-blur-md border-b border-white/10">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center space-x-4">
        <img src="Unith-Brandmark-4.png" alt="UNITH" class="h-8 w-8">
        <h1 class="text-xl font-bold">Head Video Upload Dashboard</h1>
      </div>
      <div class="flex items-center space-x-4">
        <span id="user-status" class="text-sm text-slate-300">Not authenticated</span>
        <button id="logout-btn" class="hidden px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white text-sm">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="pt-20 pb-10">

    <!-- Authentication Section -->
    <section id="auth-section" class="max-w-2xl mx-auto px-4 mb-8">
      <div class="card rounded-2xl p-6">
        <h2 class="text-2xl font-bold mb-4 text-blue-300">Authentication</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-2">Email</label>
            <input type="email" id="email-input" class="w-full px-4 py-3 rounded-lg bg-black/30 border border-white/20 text-white placeholder-slate-400 focus:border-blue-400 focus:outline-none" placeholder="your@email.com">
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Secret Key</label>
            <input type="password" id="secret-key-input" class="w-full px-4 py-3 rounded-lg bg-black/30 border border-white/20 text-white placeholder-slate-400 focus:border-blue-400 focus:outline-none" placeholder="Your UNITH secret key">
          </div>
          <button id="auth-btn" class="w-full px-6 py-3 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium transition">Authenticate & Get Token</button>
          <div id="auth-status" class="text-sm text-slate-300"></div>
        </div>
      </div>
    </section>

    <!-- Upload Section -->
    <section id="upload-section" class="max-w-4xl mx-auto px-4 hidden">
      <div class="card rounded-2xl p-6">
        <h2 class="text-2xl font-bold mb-6 text-blue-300">Upload Head Video</h2>

        <!-- Upload Area -->
        <div id="upload-area" class="upload-area rounded-xl p-8 text-center mb-6">
          <div class="mb-4">
            <svg class="mx-auto h-12 w-12 text-slate-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
              <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </div>
          <h3 class="text-lg font-medium mb-2">Drop your video file here</h3>
          <p class="text-slate-400 mb-4">or click to browse</p>
          <input type="file" id="video-input" accept="video/*" class="hidden">
          <button id="browse-btn" class="px-6 py-3 rounded-lg bg-slate-700 hover:bg-slate-600 text-white transition">Browse Files</button>
          <p class="text-xs text-slate-500 mt-2">Supported formats: MP4, MOV, AVI (max 1000MB)</p>
        </div>

        <!-- File Info -->
        <div id="file-info" class="hidden mb-6 p-4 rounded-lg bg-blue-900/20 border border-blue-400/30">
          <h4 class="font-medium mb-2">Selected File:</h4>
          <p id="file-name" class="text-sm text-slate-300"></p>
          <p id="file-size" class="text-sm text-slate-400"></p>
        </div>

        <!-- Upload Button -->
        <div class="flex justify-center">
          <button id="upload-btn" class="px-8 py-4 rounded-xl bg-green-600 hover:bg-green-700 text-white font-medium transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>Upload Video</button>
        </div>

        <!-- Progress -->
        <div id="progress-container" class="hidden mt-6">
          <div class="flex justify-between text-sm mb-2">
            <span>Uploading...</span>
            <span id="progress-percent">0%</span>
          </div>
          <div class="w-full bg-slate-700 rounded-full h-2">
            <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
          </div>
        </div>

        <!-- Status Messages -->
        <div id="status-messages" class="mt-6 space-y-2"></div>
      </div>
    </section>

    <!-- Processing Status -->
    <section id="processing-section" class="max-w-4xl mx-auto px-4 mt-8 hidden">
      <div class="card rounded-2xl p-6">
        <h2 class="text-2xl font-bold mb-4 text-blue-300">Processing Status</h2>
        <div id="processing-list" class="space-y-4">
          <!-- Processing items will be added here -->
        </div>
      </div>
    </section>

  </main>

  <!-- Scripts -->
  <script>
    // State management
    let bearerToken = null;
    let selectedFile = null;

    // DOM elements
    const authSection = document.getElementById('auth-section');
    const uploadSection = document.getElementById('upload-section');
    const processingSection = document.getElementById('processing-section');
    const authBtn = document.getElementById('auth-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const userStatus = document.getElementById('user-status');
    const authStatus = document.getElementById('auth-status');
    const uploadArea = document.getElementById('upload-area');
    const videoInput = document.getElementById('video-input');
    const browseBtn = document.getElementById('browse-btn');
    const uploadBtn = document.getElementById('upload-btn');
    const fileInfo = document.getElementById('file-info');
    const fileName = document.getElementById('file-name');
    const fileSize = document.getElementById('file-size');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const progressPercent = document.getElementById('progress-percent');
    const statusMessages = document.getElementById('status-messages');

    // Authentication
    authBtn.addEventListener('click', async () => {
      const email = document.getElementById('email-input').value;
      const secretKey = document.getElementById('secret-key-input').value;

      if (!email || !secretKey) {
        showStatus('Please fill in both email and secret key', 'error');
        return;
      }

      authBtn.disabled = true;
      authBtn.textContent = 'Authenticating...';

      try {
        const response = await fetch('https://platform-api.unith.ai/auth/token', {
          method: 'POST',
          headers: {
            'accept': 'application/json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: email,
            secretKey: secretKey
          })
        });

        if (response.ok) {
          const data = await response.json();
          bearerToken = data.access_token;
          userStatus.textContent = `Authenticated as ${email}`;
          logoutBtn.classList.remove('hidden');
          authSection.classList.add('hidden');
          uploadSection.classList.remove('hidden');
          showStatus('Authentication successful!', 'success');
        } else {
          const error = await response.text();
          showStatus(`Authentication failed: ${error}`, 'error');
        }
      } catch (error) {
        showStatus(`Network error: ${error.message}`, 'error');
      }

      authBtn.disabled = false;
      authBtn.textContent = 'Authenticate & Get Token';
    });

    // Logout
    logoutBtn.addEventListener('click', () => {
      bearerToken = null;
      selectedFile = null;
      userStatus.textContent = 'Not authenticated';
      logoutBtn.classList.add('hidden');
      authSection.classList.remove('hidden');
      uploadSection.classList.add('hidden');
      processingSection.classList.add('hidden');
      document.getElementById('email-input').value = '';
      document.getElementById('secret-key-input').value = '';
      fileInfo.classList.add('hidden');
      uploadBtn.disabled = true;
      progressContainer.classList.add('hidden');
      statusMessages.innerHTML = '';
    });

    // File upload handling
    browseBtn.addEventListener('click', () => {
      videoInput.click();
    });

    videoInput.addEventListener('change', (e) => {
      handleFileSelect(e.target.files[0]);
    });

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFileSelect(files[0]);
      }
    });

    function handleFileSelect(file) {
      if (!file) return;

      // Validate file type
      if (!file.type.startsWith('video/')) {
        showStatus('Please select a valid video file', 'error');
        return;
      }

      // Validate file size (1000MB limit)
      if (file.size > 1000 * 1024 * 1024) {
        showStatus('File size must be less than 1000MB', 'error');
        return;
      }

      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = `Size: ${(file.size / (1024 * 1024)).toFixed(2)} MB`;
      fileInfo.classList.remove('hidden');
      uploadBtn.disabled = false;
      showStatus('File selected successfully', 'success');
    }

    // Upload video
    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile || !bearerToken) return;

      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Uploading...';
      progressContainer.classList.remove('hidden');

      try {
        const formData = new FormData();
        formData.append('file', selectedFile);

        const xhr = new XMLHttpRequest();

        // Progress tracking
        xhr.upload.addEventListener('progress', (e) => {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            progressBar.style.width = percent + '%';
            progressPercent.textContent = percent + '%';
          }
        });

        xhr.addEventListener('load', () => {
          if (xhr.status === 200 || xhr.status === 201) {
            const response = JSON.parse(xhr.responseText);
            showStatus('Video uploaded successfully!', 'success');
            addProcessingItem(response);
            processingSection.classList.remove('hidden');
            // Reset upload state
            selectedFile = null;
            fileInfo.classList.add('hidden');
            uploadBtn.disabled = true;
            progressContainer.classList.add('hidden');
            progressBar.style.width = '0%';
            videoInput.value = '';
          } else {
            showStatus(`Upload failed: ${xhr.responseText}`, 'error');
          }
          uploadBtn.disabled = false;
          uploadBtn.textContent = 'Upload Video';
        });

        xhr.addEventListener('error', () => {
          showStatus('Upload failed due to network error', 'error');
          uploadBtn.disabled = false;
          uploadBtn.textContent = 'Upload Video';
        });

        xhr.open('POST', 'https://platform-api.unith.ai/head-visuals/upload');
        xhr.setRequestHeader('Authorization', `Bearer ${bearerToken}`);
        xhr.send(formData);

      } catch (error) {
        showStatus(`Upload error: ${error.message}`, 'error');
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Upload Video';
      }
    });

    function showStatus(message, type) {
      const div = document.createElement('div');
      div.className = `p-3 rounded-lg ${
        type === 'success' ? 'bg-green-900/20 border border-green-400/30 text-green-300' :
        type === 'error' ? 'bg-red-900/20 border border-red-400/30 text-red-300' :
        'bg-blue-900/20 border border-blue-400/30 text-blue-300'
      }`;
      div.textContent = message;
      statusMessages.appendChild(div);

      // Auto-remove after 5 seconds
      setTimeout(() => {
        div.remove();
      }, 5000);
    }

    function addProcessingItem(response) {
      const item = document.createElement('div');
      item.className = 'p-4 rounded-lg card-dark';
      item.innerHTML = `
        <div class="flex justify-between items-start mb-2">
          <h4 class="font-medium">${selectedFile.name}</h4>
          <span class="text-sm text-slate-400">Processing...</span>
        </div>
        <p class="text-sm text-slate-500">ID: ${response.id || 'Unknown'}</p>
        <div class="mt-2 w-full bg-slate-700 rounded-full h-1">
          <div class="bg-blue-600 h-1 rounded-full animate-pulse" style="width: 30%"></div>
        </div>
      `;
      document.getElementById('processing-list').appendChild(item);
    }
  </script>

</body>
</html>
